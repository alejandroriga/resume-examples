<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>Login — Toptal Resume Templates CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }
    .login-card p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-login:hover { background: #4f46e5; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      background: #6366f1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">T</div>
      <div>
        <div style="font-weight:700;font-size:16px;">Templates CMS</div>
        <div style="font-size:12px;color:#64748b;">Toptal Resume</div>
      </div>
    </div>

    <h1>Sign In</h1>
    <p>Enter your credentials to access the CMS</p>

    <div class="error-msg" id="error"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('error');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/cms';
        } else {
          err.textContent = data.error || 'Invalid credentials';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Server not reachable. Please try again.';
        err.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  </script>
</body>
</html>
