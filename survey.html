<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toptal Resume — Internal Survey</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --blue: #3b82f6;
    --blue-hover: #2563eb;
    --green: #10b981;
    --red: #f87171;
    --purple: #7c3aed;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .survey-header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
  }
  .survey-header .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .survey-header .logo span { color: var(--blue); }
  .survey-header .subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  /* Progress */
  .progress-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 0;
    border-bottom: 1px solid var(--border);
  }
  .progress-track {
    height: 4px;
    background: var(--surface);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    transition: width 0.3s ease;
    border-radius: 0 2px 2px 0;
  }
  .progress-text {
    text-align: center;
    padding: 6px 0;
    font-size: 12px;
    color: var(--muted);
  }

  /* Container */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* Survey intro */
  .survey-intro {
    text-align: center;
    margin-bottom: 40px;
  }
  .survey-intro h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .survey-intro .desc {
    font-size: 15px;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto;
  }
  .survey-intro .meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .survey-intro .meta span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  /* Sections */
  .survey-section {
    margin-bottom: 36px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--blue);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-card:focus-within {
    border-color: var(--blue);
  }
  .question-card.answered {
    border-color: var(--green);
  }
  .question-text {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .question-text .q-num {
    color: var(--blue);
    font-weight: 700;
  }
  .required-star { color: var(--red); }

  /* Radio / Checkbox options */
  .option-list { list-style: none; }
  .option-item {
    position: relative;
    margin-bottom: 8px;
  }
  .option-item label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s;
    background: rgba(255,255,255,0.02);
  }
  .option-item label:hover {
    background: rgba(59, 130, 246, 0.08);
    border-color: rgba(59, 130, 246, 0.2);
  }
  .option-item input[type="radio"],
  .option-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--blue);
    flex-shrink: 0;
  }
  .option-item input:checked + .option-text {
    color: #fff;
    font-weight: 500;
  }
  .option-item:has(input:checked) label {
    background: rgba(59, 130, 246, 0.12);
    border-color: rgba(59, 130, 246, 0.3);
  }

  /* Other input */
  .other-input {
    margin-top: 8px;
    margin-left: 34px;
    display: none;
  }
  .other-input.visible { display: block; }
  .other-input input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
  }
  .other-input input:focus { border-color: var(--blue); }

  /* Text fields */
  .text-field input,
  .text-field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-field input:focus,
  .text-field textarea:focus {
    border-color: var(--blue);
  }
  .text-field textarea {
    min-height: 120px;
    resize: vertical;
  }
  .text-field .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .text-field .field-row {
    margin-bottom: 12px;
  }
  .text-field .field-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
  }

  /* Permission checkbox */
  .permission-box {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px;
    background: rgba(124, 58, 237, 0.08);
    border: 1px solid rgba(124, 58, 237, 0.2);
    border-radius: 8px;
    margin-top: 12px;
  }
  .permission-box input { margin-top: 3px; accent-color: var(--purple); }
  .permission-box label {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    line-height: 1.5;
  }

  /* Submit */
  .submit-area {
    text-align: center;
    margin-top: 32px;
  }
  .btn-submit {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 40px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-submit:hover { background: var(--blue-hover); transform: translateY(-1px); }
  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Error / success */
  .error-msg {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    text-align: center;
  }

  /* Thank you */
  .thank-you {
    text-align: center;
    padding: 80px 20px;
  }
  .thank-you .check-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(16, 185, 129, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  .thank-you h2 { font-size: 24px; margin-bottom: 12px; }
  .thank-you p { color: var(--muted); font-size: 15px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Multi-select hint */
  .multi-hint {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 10px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 20px 16px 60px; }
    .survey-intro h1 { font-size: 22px; }
    .question-card { padding: 16px; }
    .survey-intro .meta { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="survey-header">
  <div class="logo">Toptal<span>.</span> Resume</div>
  <div class="subtitle">Internal Research Survey</div>
</div>

<div class="progress-bar" id="progressBar" style="display:none;">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 of 0 answered</div>
</div>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading survey...</p>
  </div>
</div>

<script>
const surveyId = window.location.pathname.split('/survey/')[1]?.replace(/\/$/, '');
let surveyData = null;
let answers = {};

async function init() {
  if (!surveyId) {
    document.getElementById('app').innerHTML = '<div class="error-msg">Invalid survey URL.</div>';
    return;
  }
  try {
    const res = await fetch('/api/surveys/' + encodeURIComponent(surveyId));
    const data = await res.json();
    if (!data.ok) {
      document.getElementById('app').innerHTML = `<div class="thank-you">
        <div class="check-circle" style="background:rgba(248,113,113,0.15);">&#10007;</div>
        <h2>${data.error || 'Survey not available'}</h2>
        <p>This survey may have been closed or the link is incorrect.</p>
      </div>`;
      return;
    }
    surveyData = data.survey;
    renderSurvey();
  } catch (err) {
    document.getElementById('app').innerHTML = '<div class="error-msg">Failed to load survey. Please try again.</div>';
  }
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSurvey() {
  const s = surveyData;
  const questions = s.questions;

  // Group questions by section
  const sections = {};
  for (const q of questions) {
    const sec = q.section || 'Questions';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(q);
  }

  let html = `
    <div class="survey-intro">
      <h1>${esc(s.title)}</h1>
      <div class="desc">${esc(s.description)}</div>
      <div class="meta">
        <span>&#9202; ~5 minutes</span>
        <span>&#128274; Responses are confidential</span>
      </div>
    </div>
    <div id="errorBox" style="display:none;" class="error-msg"></div>
  `;

  // About You section (always first)
  html += `
    <div class="survey-section">
      <div class="section-label">About You</div>
      <div class="question-card text-field">
        <div class="field-row">
          <div class="field-label">Full Name <span class="required-star">*</span></div>
          <input type="text" id="resp_name" placeholder="Your full name" required>
        </div>
        <div class="field-row">
          <div class="field-label">Position at Toptal <span class="required-star">*</span></div>
          <input type="text" id="resp_position" placeholder="e.g. Senior Engineering Manager">
        </div>
        <div class="field-row" style="margin-bottom:0;">
          <div class="field-label">Toptal Email <span class="required-star">*</span></div>
          <input type="email" id="resp_email" placeholder="you@toptal.com">
        </div>
      </div>
    </div>
  `;

  for (const [sectionName, sectionQs] of Object.entries(sections)) {
    html += `<div class="survey-section">
      <div class="section-label">${esc(sectionName)}</div>`;

    for (const q of sectionQs) {
      html += renderQuestion(q);
    }
    html += `</div>`;
  }

  // Submit
  html += `
    <div class="submit-area">
      <button class="btn-submit" id="submitBtn" onclick="submitSurvey()">
        Submit Responses
      </button>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
  document.getElementById('progressBar').style.display = 'block';
  updateProgress();

  // Attach input listeners for About You fields
  ['resp_name','resp_position','resp_email'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', updateProgress);
  });
}

function renderQuestion(q) {
  const qId = q.id;
  let inner = '';

  if (q.type === 'single') {
    inner += `<ul class="option-list">`;
    for (const opt of q.options) {
      const val = opt.value || opt.label;
      inner += `<li class="option-item">
        <label>
          <input type="radio" name="${qId}" value="${esc(val)}" onchange="setAnswer('${qId}', '${esc(val)}'); updateProgress();">
          <span class="option-text">${esc(opt.label)}</span>
        </label>
      </li>`;
    }
    if (q.hasOther) {
      inner += `<li class="option-item">
        <label>
          <input type="radio" name="${qId}" value="__other__" onchange="setAnswer('${qId}', '__other__'); document.getElementById('other_${qId}').classList.add('visible'); updateProgress();">
          <span class="option-text">Other, specify:</span>
        </label>
        <div class="other-input" id="other_${qId}">
          <input type="text" placeholder="Please specify..." oninput="answers['${qId}_other']=this.value;">
        </div>
      </li>`;
    }
    inner += `</ul>`;
  } else if (q.type === 'multi') {
    inner += `<div class="multi-hint">Select all that apply</div>`;
    inner += `<ul class="option-list">`;
    for (const opt of q.options) {
      const val = opt.value || opt.label;
      inner += `<li class="option-item">
        <label>
          <input type="checkbox" name="${qId}" value="${esc(val)}" onchange="toggleMulti('${qId}', '${esc(val)}'); updateProgress();">
          <span class="option-text">${esc(opt.label)}</span>
        </label>
      </li>`;
    }
    if (q.hasOther) {
      inner += `<li class="option-item">
        <label>
          <input type="checkbox" name="${qId}" value="__other__" onchange="toggleMulti('${qId}', '__other__'); document.getElementById('other_${qId}').classList.toggle('visible'); updateProgress();">
          <span class="option-text">Other, specify:</span>
        </label>
        <div class="other-input" id="other_${qId}">
          <input type="text" placeholder="Please specify..." oninput="answers['${qId}_other']=this.value;">
        </div>
      </li>`;
    }
    inner += `</ul>`;
  } else if (q.type === 'textarea') {
    const maxLen = q.maxLength || 2000;
    inner += `<div class="text-field">
      <textarea id="ta_${qId}" placeholder="${esc(q.placeholder || 'Your response...')}" maxlength="${maxLen}"
        oninput="setAnswer('${qId}', this.value); document.getElementById('cc_${qId}').textContent=this.value.length+' / ${maxLen}'; updateProgress();"></textarea>
      <div class="char-count" id="cc_${qId}">0 / ${maxLen}</div>
    </div>`;
    if (q.permission) {
      inner += `<div class="permission-box">
        <input type="checkbox" id="perm_${qId}" onchange="answers['${qId}_permission']=this.checked;">
        <label for="perm_${qId}">${esc(q.permission)}</label>
      </div>`;
    }
  }

  const num = q.num ? `<span class="q-num">Q${q.num}.</span> ` : '';
  return `<div class="question-card" id="card_${qId}">
    <div class="question-text">${num}${esc(q.text)} <span class="required-star">*</span></div>
    ${inner}
  </div>`;
}

function setAnswer(qId, val) {
  answers[qId] = val;
  const card = document.getElementById('card_' + qId);
  if (card) card.classList.add('answered');
  // Hide other input if not "other"
  if (val !== '__other__') {
    const otherDiv = document.getElementById('other_' + qId);
    if (otherDiv) otherDiv.classList.remove('visible');
  }
}

function toggleMulti(qId, val) {
  if (!answers[qId]) answers[qId] = [];
  const idx = answers[qId].indexOf(val);
  if (idx >= 0) answers[qId].splice(idx, 1);
  else answers[qId].push(val);
  const card = document.getElementById('card_' + qId);
  if (card) {
    if (answers[qId].length > 0) card.classList.add('answered');
    else card.classList.remove('answered');
  }
}

function updateProgress() {
  if (!surveyData) return;
  const total = surveyData.questions.length + 3; // +3 for name, position, email
  let answered = 0;
  if (document.getElementById('resp_name')?.value.trim()) answered++;
  if (document.getElementById('resp_position')?.value.trim()) answered++;
  if (document.getElementById('resp_email')?.value.trim()) answered++;
  for (const q of surveyData.questions) {
    if (answers[q.id]) {
      if (Array.isArray(answers[q.id]) && answers[q.id].length === 0) continue;
      if (answers[q.id] === '') continue;
      answered++;
    }
  }
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = answered + ' of ' + total + ' answered';
}

async function submitSurvey() {
  const name = document.getElementById('resp_name')?.value.trim();
  const email = document.getElementById('resp_email')?.value.trim();
  const position = document.getElementById('resp_position')?.value.trim();
  const errorBox = document.getElementById('errorBox');

  // Validate
  if (!name || !email || !position) {
    errorBox.textContent = 'Please fill in your name, position, and email.';
    errorBox.style.display = 'block';
    errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  if (!email.includes('@')) {
    errorBox.textContent = 'Please enter a valid email address.';
    errorBox.style.display = 'block';
    return;
  }

  // Check all required questions answered
  const unanswered = [];
  for (const q of surveyData.questions) {
    if (!answers[q.id] || (Array.isArray(answers[q.id]) && answers[q.id].length === 0)) {
      unanswered.push(q.num || q.id);
    }
  }
  if (unanswered.length > 0) {
    errorBox.textContent = 'Please answer all questions. Missing: Q' + unanswered.join(', Q');
    errorBox.style.display = 'block';
    errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  errorBox.style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await fetch('/api/survey-responses/' + encodeURIComponent(surveyId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, position, answers })
    });
    const data = await res.json();
    if (!data.ok) {
      errorBox.textContent = data.error || 'Failed to submit. Please try again.';
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Submit Responses';
      return;
    }
    // Show thank you
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('app').innerHTML = `
      <div class="thank-you">
        <div class="check-circle">&#10003;</div>
        <h2>Thank you, ${esc(name.split(' ')[0])}!</h2>
        <p>Your responses have been recorded. Your insights will directly shape<br>the guidance we provide to thousands of candidates on Toptal Resume.</p>
      </div>
    `;
  } catch (err) {
    errorBox.textContent = 'Network error. Please check your connection and try again.';
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Submit Responses';
  }
}

init();
</script>
</body>
</html>
