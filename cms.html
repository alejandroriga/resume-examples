      <tbody>`;

  for (let i = 0; i < responses.length; i++) {
    const r = responses[i];
    const dateStr = r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
    html += `<tr style="border-top:1px solid #334155;">
      <td style="padding:10px 14px;color:#64748b;">${i + 1}</td>
      <td style="padding:10px 14px;color:#e2e8f0;font-weight:600;">${esc(r.respondent_name)}</td>
      <td style="padding:10px 14px;color:#94a3b8;">${esc(r.respondent_position)}</td>
      <td style="padding:10px 14px;color:#94a3b8;font-family:monospace;font-size:12px;">${esc(r.respondent_email)}</td>
      <td style="padding:10px 14px;color:#64748b;font-size:12px;">${dateStr}</td>
      <td style="padding:10px 14px;">
        <button onclick="toggleResponseDetail(${r.id})" style="font-family:inherit;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid #334155;background:transparent;color:#818cf8;">View</button>
      </td>
    </tr>
    <tr id="resp-detail-${r.id}" style="display:none;border-top:1px solid #1e293b;">
      <td colspan="6" style="padding:14px;background:#0f172a;">
        ${renderResponseDetail(r, questions)}
      </td>
    </tr>`;
  }

  html += `</tbody></table></div>`;

  // Export
  html += `<div style="margin-top:20px;text-align:right;">
    <button onclick="exportSurveyJSON('${esc(survey.id)}')" style="font-family:inherit;font-size:12px;font-weight:600;padding:8px 16px;border-radius:6px;cursor:pointer;border:1px solid #334155;background:transparent;color:#94a3b8;">Copy JSON to Clipboard</button>
  </div>`;

  return html;
}

function renderQuestionBreakdown(q, responses) {
  let html = `<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px 20px;margin-bottom:12px;">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;">
      <span style="color:#64748b;font-size:13px;font-weight:700;min-width:28px;">${q.num}.</span>
      <span style="color:#e2e8f0;font-size:13px;font-weight:600;">${esc(q.text)}</span>
    </div>`;

  if (q.type === 'textarea') {
    // Show open-ended responses as a list
    html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
    let count = 0;
    for (const r of responses) {
      const answers = (typeof r.answers === 'string' ? JSON.parse(r.answers || '{}') : r.answers || {});
      const val = answers[q.id];
      if (val && val.trim()) {
        count++;
        const permission = answers[q.id + '_permission'];
        html += `<div style="background:#0f172a;padding:10px 14px;border-radius:6px;border-left:3px solid #818cf8;">
          <div style="color:#e2e8f0;font-size:13px;white-space:pre-wrap;line-height:1.6;">${esc(val)}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
            <span style="color:#64748b;font-size:11px;">— ${esc(r.respondent_name)}, ${esc(r.respondent_position)}</span>
            ${permission ? '<span style="font-size:10px;color:#22c55e;background:#052e16;padding:2px 6px;border-radius:4px;">Quotable</span>' : '<span style="font-size:10px;color:#94a3b8;background:#1e293b;padding:2px 6px;border-radius:4px;">No quote permission</span>'}
          </div>
        </div>`;
      }
    }
    if (count === 0) {
      html += `<div style="color:#64748b;font-size:12px;font-style:italic;">No responses yet</div>`;
    }
    html += `</div>`;
  } else {
    // Bar chart for single/multi choice
    const tallies = {};
    const otherTexts = [];
    let totalVotes = 0;

    for (const r of responses) {
      const answers = (typeof r.answers === 'string' ? JSON.parse(r.answers || '{}') : r.answers || {});
      let val = answers[q.id];
      if (!val) continue;

      if (q.type === 'multi') {
        // val is an array
        if (!Array.isArray(val)) val = [val];
        for (const v of val) {
          tallies[v] = (tallies[v] || 0) + 1;
          totalVotes++;
        }
      } else {
        tallies[val] = (tallies[val] || 0) + 1;
        totalVotes++;
      }

      // "Other" text
      const otherText = answers[q.id + '_other'];
      if (otherText) otherTexts.push({ name: r.respondent_name, text: otherText });
    }

    if (totalVotes === 0) {
      html += `<div style="color:#64748b;font-size:12px;font-style:italic;">No responses yet</div>`;
    } else {
      const options = q.options || [];
      html += `<div style="display:flex;flex-direction:column;gap:6px;">`;
      for (const opt of options) {
        const count = tallies[opt.value] || 0;
        const pct = totalVotes > 0 ? Math.round(count / (q.type === 'multi' ? responses.length : totalVotes) * 100) : 0;
        html += `<div style="display:flex;align-items:center;gap:10px;">
          <div style="width:28px;text-align:right;color:#64748b;font-size:12px;font-weight:600;">${opt.value}</div>
          <div style="flex:1;background:#0f172a;border-radius:4px;height:24px;position:relative;overflow:hidden;">
            <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:linear-gradient(90deg,#818cf8,#6366f1);border-radius:4px;transition:width .3s;"></div>
            <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#e2e8f0;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 60px);">${esc(opt.label)}</span>
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#e2e8f0;z-index:1;">${count} (${pct}%)</span>
          </div>
        </div>`;
      }

      // "Other" option count
      if (q.hasOther) {
        const otherCount = tallies['other'] || 0;
        const otherPct = totalVotes > 0 ? Math.round(otherCount / (q.type === 'multi' ? responses.length : totalVotes) * 100) : 0;
        html += `<div style="display:flex;align-items:center;gap:10px;">
          <div style="width:28px;text-align:right;color:#64748b;font-size:12px;font-weight:600;">...</div>
          <div style="flex:1;background:#0f172a;border-radius:4px;height:24px;position:relative;overflow:hidden;">
            <div style="position:absolute;left:0;top:0;bottom:0;width:${otherPct}%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:4px;"></div>
            <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#e2e8f0;z-index:1;">Other</span>
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#e2e8f0;z-index:1;">${otherCount} (${otherPct}%)</span>
          </div>
        </div>`;
      }
      html += `</div>`;

      // Show "Other" text responses
      if (otherTexts.length > 0) {
        html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #334155;">
          <div style="font-size:11px;color:#64748b;font-weight:600;margin-bottom:4px;">"Other" responses:</div>`;
        for (const ot of otherTexts) {
          html += `<div style="font-size:12px;color:#94a3b8;margin-left:12px;">• "${esc(ot.text)}" — <span style="color:#64748b;">${esc(ot.name)}</span></div>`;
        }
        html += `</div>`;
      }

      // N respondents note for multi
      if (q.type === 'multi') {
        html += `<div style="font-size:10px;color:#475569;margin-top:4px;">Percentages based on ${responses.length} respondents (multi-select)</div>`;
      }
    }
  }

  html += `</div>`;
  return html;
}

function renderResponseDetail(r, questions) {
  const answers = (typeof r.answers === 'string' ? JSON.parse(r.answers || '{}') : r.answers || {});
  let html = `<div style="display:flex;flex-direction:column;gap:6px;">`;
  for (const q of questions) {
    const val = answers[q.id];
    if (!val) continue;

    let displayVal = '';
    if (q.type === 'textarea') {
      displayVal = `<div style="white-space:pre-wrap;color:#e2e8f0;">${esc(val)}</div>`;
    } else if (q.type === 'multi' && Array.isArray(val)) {
      const labels = val.map(v => {
        if (v === 'other') return 'Other: ' + (answers[q.id + '_other'] || '');
        const opt = (q.options || []).find(o => o.value === v);
        return opt ? opt.label : v;
      });
      displayVal = labels.map(l => `<span style="background:#334155;padding:2px 8px;border-radius:4px;font-size:11px;color:#e2e8f0;">${esc(l)}</span>`).join(' ');
    } else {
      const opt = (q.options || []).find(o => o.value === val);
      displayVal = `<span style="color:#e2e8f0;">${esc(opt ? opt.label : val)}</span>`;
      if (val === 'other' && answers[q.id + '_other']) {
        displayVal += ` <span style="color:#94a3b8;font-size:12px;">— "${esc(answers[q.id + '_other'])}"</span>`;
      }
    }

    html += `<div style="display:flex;gap:8px;align-items:flex-start;">
      <span style="color:#64748b;font-size:12px;font-weight:700;min-width:28px;">Q${q.num}</span>
      <div style="flex:1;font-size:12px;">${displayVal}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function toggleResponseDetail(id) {
  const row = document.getElementById('resp-detail-' + id);
  if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
}

function exportSurveyJSON(surveyId) {
  const responses = _surveyResponsesCache[surveyId] || [];
  const data = responses.map(r => ({
    name: r.respondent_name,
    position: r.respondent_position,
    email: r.respondent_email,
    submitted: r.submitted_at,
    answers: (typeof r.answers === 'string' ? JSON.parse(r.answers || '{}') : r.answers || {})
  }));
  navigator.clipboard.writeText(JSON.stringify(data, null, 2));
  showToast('JSON copied to clipboard!');
}

document.addEventListener('DOMContentLoaded', async () => {
  // Check authentication
  try {
    const res = await fetch('/api/me');
    if (!res.ok) {
      window.location.href = '/login';
      return;
    }
    const { user } = await res.json();
    currentUser = user;
    const userEl = document.getElementById('userInfo');
    if (userEl) {
      userEl.textContent = user.display + ' (' + user.role + ')';
    }
  } catch(e) {
    window.location.href = '/login';
    return;
  }

  await loadAllData();
  renderSidebar();
  renderMain();
  lucide.createIcons();
});
</script>
