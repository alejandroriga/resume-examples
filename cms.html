function printReport(type) {
  const css = `
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 24px; color: #1e293b; line-height: 1.6; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .meta { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .summary { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .summary-card { padding: 16px 24px; border: 1px solid #e2e8f0; border-radius: 10px; text-align: center; }
    .summary-card .val { font-size: 32px; font-weight: 800; }
    .summary-card .label { font-size: 12px; font-weight: 600; color: #64748b; }
    .tier-bar { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
    .tier-bar .bar { height: 6px; background: #e2e8f0; border-radius: 3px; flex: 1; overflow: hidden; }
    .tier-bar .fill { height: 100%; border-radius: 3px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
    th { background: #f1f5f9; font-weight: 700; text-align: left; padding: 8px 10px; border: 1px solid #e2e8f0; }
    td { padding: 6px 10px; border: 1px solid #e2e8f0; }
    tr:nth-child(even) { background: #f8fafc; }
    .found { color: #16a34a; } .missing { color: #ef4444; }
    .cat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f1f5f9; border-radius: 8px; margin: 14px 0 6px; font-weight: 700; font-size: 14px; }
    .cat-score { font-weight: 700; }
    .crit-row { display: flex; justify-content: space-between; padding: 5px 14px 5px 28px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
    .check { font-size: 11px; padding: 2px 0 2px 42px; }
    .check.pass { color: #16a34a; } .check.fail { color: #ef4444; }
    .phase-note { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #92400e; }
    @media print { body { padding: 12px; } .summary-card { break-inside: avoid; } }
  `;

  let body = '';

  if (type === 'keywordCoverage' && _kwCoverageCache) {
    const d = _kwCoverageCache;
    const covColor = d.coveragePercent >= 70 ? '#16a34a' : d.coveragePercent >= 50 ? '#ca8a04' : '#ef4444';

    body += `<h1>Keyword Coverage Analysis</h1>`;
    body += `<p class="meta">Toptal Resume Examples — Generated ${new Date().toLocaleString()}</p>`;

    // Summary
    body += `<div class="summary">`;
    body += `<div class="summary-card"><div class="val" style="color:${covColor};">${d.coveragePercent}%</div><div class="label">Coverage</div><div style="font-size:11px;color:#64748b;">${d.found} of ${d.total} keywords</div></div>`;
    for (const [key, tier] of Object.entries(d.tiers)) {
      const pct = tier.total > 0 ? Math.round((tier.found / tier.total) * 100) : 0;
      body += `<div class="summary-card"><div class="val" style="font-size:20px;">${pct}%</div><div class="label">${esc(tier.label)}</div><div style="font-size:11px;color:#64748b;">${tier.found}/${tier.total}</div></div>`;
    }
    body += `</div>`;

    // Full table — all keywords
    body += `<table><thead><tr><th>Keyword</th><th style="text-align:right;width:90px;">Volume</th><th style="text-align:center;width:80px;">Status</th><th style="text-align:center;width:70px;">Match</th><th style="text-align:center;width:60px;">Tier</th></tr></thead><tbody>`;
    const sorted = [...d.keywords].sort((a, b) => (b.volume || 0) - (a.volume || 0));
    for (const kw of sorted) {
      const statusCls = kw.found ? 'found' : 'missing';
      const statusTxt = kw.found ? '✓ Found' : '✗ Missing';
      const matchTxt = kw.matchType || '—';
      body += `<tr><td>${esc(kw.keyword)}</td><td style="text-align:right;">${(kw.volume||0).toLocaleString()}</td><td style="text-align:center;" class="${statusCls}">${statusTxt}</td><td style="text-align:center;">${esc(matchTxt)}</td><td style="text-align:center;">${esc(kw.tier||'')}</td></tr>`;
    }
    body += `</tbody></table>`;

  } else if (type === 'rubricScore' && _rubricScoreCache) {
    const d = _rubricScoreCache;

    body += `<h1>SEO Page Score — ${d.totalScore}/${d.maxScore}</h1>`;
    body += `<p class="meta">Toptal Resume Examples — Generated ${new Date().toLocaleString()} — Rating: ${d.rating} (${Math.round((d.totalScore / d.maxScore) * 100)}%)</p>`;

    // Phase notes
    if (d.phaseNotes && d.phaseNotes.length) {
      body += `<div class="phase-note"><strong>⚠ Phase-Deferred Sections:</strong> ${d.phaseNotes.map(n => esc(n)).join(' · ')}</div>`;
    }

    // All categories expanded
    for (const cat of d.categories) {
      const pct = cat.maxScore > 0 ? Math.round((cat.score / cat.maxScore) * 100) : 0;
      const catColor = pct >= 80 ? '#16a34a' : pct >= 50 ? '#ca8a04' : '#ef4444';
      body += `<div class="cat-header"><span>${esc(cat.name)}</span><span class="cat-score" style="color:${catColor};">${cat.score}/${cat.maxScore}</span></div>`;

      for (const crit of cat.criteria) {
        const critPct = crit.maxScore > 0 ? Math.round((crit.score / crit.maxScore) * 100) : 0;
        const critIcon = crit.deferred ? '⏸️' : critPct >= 80 ? '✅' : critPct >= 50 ? '⚠️' : '❌';
        const critColor = crit.deferred ? '#64748b' : critPct >= 80 ? '#16a34a' : critPct >= 50 ? '#ca8a04' : '#ef4444';
        body += `<div class="crit-row"><span>${critIcon} ${esc(crit.name)}</span><span style="color:${critColor};font-weight:600;">${crit.score}/${crit.maxScore}</span></div>`;

        if (crit.checks && crit.checks.length) {
          for (const ch of crit.checks) {
            body += `<div class="check ${ch.pass ? 'pass' : 'fail'}">${ch.pass ? '✓' : '✗'} ${esc(ch.detail)}</div>`;
          }
        }
      }
    }
  }

  if (!body) { showToast('No data to print — run the analysis first.'); return; }

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${type === 'keywordCoverage' ? 'Keyword Coverage' : 'SEO Page Score'} — Toptal Resume</title><style>${css}</style></head><body>${body}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 300);
}

async function restoreSnapshot(id, name) {

    const result = await res.json();
    if (result.ok) {
      showToast('Snapshot restored! Reloading...', 2000);
      setTimeout(() => window.location.reload(), 1500);
    } else {
      showToast('Restore failed: ' + (result.error || 'Unknown error'), 4000);
    }
  } catch(e) {

  }
}

let _approvalsCache = {}; // { docId: { fieldPath: { approved, approved_by, approved_at } } }

async function loadApprovals(docId) {
  try {
    const res = await fetch('/api/approvals/' + encodeURIComponent(docId));
    const { approvals } = await res.json();
    _approvalsCache[docId] = approvals || {};
  } catch(e) {
    _approvalsCache[docId] = {};
  }
}

async function toggleApproval(docId, fieldPath, checkbox) {
  if (!currentUser || currentUser.role !== 'supervisor') {
    checkbox.checked = !checkbox.checked; // revert
    showToast('Only supervisors can approve fields', 3000);
    return;
  }
  try {
    const reqBody = { approved: checkbox.checked };
    // When approving, capture content + metadata for the immutable ledger
    if (checkbox.checked) {
      // Find the field's content from the nearest input/textarea with matching data-hp/data-sp/data-tpl
      const fieldEl = document.querySelector(`[data-hp="${fieldPath}"], [data-sp="${fieldPath}"], [data-tpl="${fieldPath}"]`);
      reqBody.content = fieldEl ? (fieldEl.value || fieldEl.textContent || '') : '';
      reqBody.pageLabel = getPageName(docId);
      reqBody.sectionLabel = getSectionLabel(fieldPath);
      reqBody.htmlElement = getHtmlElement(fieldPath);
    }
    await fetch('/api/approvals/' + encodeURIComponent(docId) + '/' + encodeURIComponent(fieldPath), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reqBody)
    });
    // Update cache
    if (!_approvalsCache[docId]) _approvalsCache[docId] = {};
    _approvalsCache[docId][fieldPath] = {
      approved: checkbox.checked,
      approved_by: currentUser.username,
      approved_at: new Date().toISOString()
    };
  } catch(e) {
    checkbox.checked = !checkbox.checked; // revert on error
    showToast('Failed to update approval', 3000);
  }
}

function getHtmlElement(fieldPath) {
  if (/\.h1$/i.test(fieldPath)) return 'h1';
  if (/\.heading$/i.test(fieldPath) || /\.title$/i.test(fieldPath)) return 'h2';
  if (/\.question$/i.test(fieldPath)) return 'h3';
  if (/\.subtitle$/i.test(fieldPath) || /\.body$/i.test(fieldPath) || /\.answer$/i.test(fieldPath) || /\.quote$/i.test(fieldPath) || /\.description$/i.test(fieldPath)) return 'p';
  if (/\.badge$/i.test(fieldPath) || /\.label$/i.test(fieldPath) || /\.value$/i.test(fieldPath) || /\.name$/i.test(fieldPath) || /\.role$/i.test(fieldPath)) return 'span';
  if (/\.ctaPrimary$/i.test(fieldPath) || /\.ctaSecondary$/i.test(fieldPath) || /\.cta$/i.test(fieldPath)) return 'button';
  if (/\.metaTitle$/i.test(fieldPath) || /^meta\.title$/i.test(fieldPath)) return 'title';
  if (/\.metaDescription$/i.test(fieldPath) || /^meta\.description$/i.test(fieldPath)) return 'meta';
  return 'text';
}

/** Generate approval checkbox + history button + SEO score badge + check button HTML */
function fieldControls(docId, fieldPath, hasBrief) {
  const approvals = _approvalsCache[docId] || {};
  const approval = approvals[fieldPath] || {};
  const checked = approval.approved ? 'checked' : '';
  const disabled = (!currentUser || currentUser.role !== 'supervisor') ? 'disabled' : '';
  const approvedBy = approval.approved_by ? ` title="Approved by ${esc(approval.approved_by)}"` : '';

  // SEO score badge + check button — only for fields with an SEO brief
  let seoBadge = '';
  let seoBtn = '';
  if (hasBrief) {
    const seoScores = _seoScoresCache[docId] || {};
    const score = seoScores[fieldPath];
    if (score) {
      const stale = isSeoScoreStale(docId, fieldPath);
      const g = score.generalScore;
      const k = score.keywordScore;
      const a = score.aiProbability;
      const fieldOverall = Math.round((g + k + (100 - a)) / 3);
      const color = stale ? '#64748b' : seoScoreColor(fieldOverall);
      const bg = stale ? 'rgba(100,116,139,.15)' : (fieldOverall >= 70 ? 'rgba(74,222,128,.12)' : fieldOverall >= 40 ? 'rgba(251,191,36,.12)' : 'rgba(248,113,113,.12)');
      seoBadge = `<span onclick="showSeoDetail('${esc(docId)}','${esc(fieldPath)}')" style="display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:${bg};color:${color};cursor:pointer;" title="General: ${g}% | Keywords: ${k}% | AI: ${a}%${stale ? ' (stale)' : ''}">${fieldOverall}%${stale ? '*' : ''}</span>`;
    }
    seoBtn = `<button onclick="runSeoCheck('${esc(docId)}','${esc(fieldPath)}',this)" style="background:none;border:1px solid #d97706;color:#d97706;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;" title="Check SEO with AI">SEO ✓</button>`;
    seoBtn += ` <button onclick="showSuggestion('${esc(docId)}','${esc(fieldPath)}')" style="background:none;border:1px solid #8b5cf6;color:#8b5cf6;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;" title="AI content suggestion based on SEO brief, comments &amp; history">\u2728 Suggest</button>`;
  }

  // Comment count badge + button
  const commentCounts = _commentCountsCache[docId] || {};
  const commentCount = commentCounts[fieldPath] || 0;
  const commentBadge = commentCount > 0
    ? `<span onclick="showComments('${esc(docId)}','${esc(fieldPath)}')" style="display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(129,140,248,.12);color:#818cf8;cursor:pointer;" title="${commentCount} comment${commentCount!==1?'s':''}">${commentCount} \u{1F4AC}</span>`
    : '';
  const commentBtn = `<button onclick="showComments('${esc(docId)}','${esc(fieldPath)}')" style="background:none;border:1px solid #334155;color:#818cf8;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;" title="Comments">\u{1F4AC}</button>`;

  // Expert review count badge + button
  const erCounts = _expertReviewCountsCache[docId] || {};
  const erCount = erCounts[fieldPath] || 0;
  const erBadge = erCount > 0

    ${commentBadge}
    ${commentBtn}
    ${erBadge}
    ${erBtn}
  </span>`;
}

let _seoScoresCache = {}; // { docId: { fieldPath: { generalScore, keywordScore, aiProbability, recommendations, contentHash, checkedContent } } }

async function loadSeoScores(docId) {
  try {
    const res = await fetch('/api/seo-scores/' + encodeURIComponent(docId));
    const data = await res.json();
    _seoScoresCache[docId] = data.scores || {};
  } catch(e) {
    _seoScoresCache[docId] = {};
  }
}

/** Check if a score is stale (content changed since last check) */
function isSeoScoreStale(docId, fieldPath) {
  const score = (_seoScoresCache[docId] || {})[fieldPath];
  if (!score) return true;
  // If we stored the checked content, compare directly
  if (score.checkedContent !== undefined) {
    const input = findFieldInput(docId, fieldPath);
    if (input) return (input.value || '') !== score.checkedContent;
  }
  return false;
}

/** Find a field input by docId + fieldPath — supports standard data-sp/hp/tpl and catgrid fields */
function findFieldInput(docId, fieldPath) {
  return document.querySelector(`[data-sp="${fieldPath}"], [data-hp="${fieldPath}"], [data-tpl="${fieldPath}"]`)
    || document.querySelector(`[data-field-doc="${docId}"][data-field-path="${fieldPath}"]`);
}

/** Score color helper */
function seoScoreColor(val) {
  if (val >= 70) return '#4ade80';
  if (val >= 40) return '#fbbf24';
  return '#f87171';
}

/** AI probability color (inverse — lower is better) */
function seoAiColor(val) {
  if (val <= 30) return '#4ade80';
  if (val <= 60) return '#fbbf24';
  return '#f87171';
}

/** Run SEO check for a single field */
async function runSeoCheck(docId, fieldPath, btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '...';
  btn.style.opacity = '0.5';

  // Get field content from the DOM
  const input = findFieldInput(docId, fieldPath);
  const fieldContent = input ? (input.value || input.textContent || '') : '';

  if (!fieldContent.trim()) {
    btn.disabled = false;
    btn.textContent = origText;
    btn.style.opacity = '1';
    showToast('Field is empty — nothing to check', 2000);
    return;
  }

  try {
    const res = await fetch(`/api/seo-check/${encodeURIComponent(docId)}/${encodeURIComponent(fieldPath)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fieldContent })
    });
    const data = await res.json();
    if (data.ok) {
      if (!_seoScoresCache[docId]) _seoScoresCache[docId] = {};
      _seoScoresCache[docId][fieldPath] = {
        ...data.scores,
        contentHash: data.contentHash,
        checkedContent: fieldContent
      };
      // Re-inject controls to update badge
      injectFieldControls(docId);
      // Also refresh inline catgrid controls if applicable
      const _catField = document.querySelector(`[data-field-doc="${docId}"][data-field-path="${fieldPath}"]`);
      if (_catField) {
        const _ctrl = _catField.closest('.field')?.querySelector('.field-controls');
        if (_ctrl) _ctrl.innerHTML = fieldControls(docId, fieldPath, true);
      }
      updatePageScoreBanner(docId);
      const _o = Math.round((data.scores.generalScore + data.scores.keywordScore + (100 - data.scores.aiProbability)) / 3);
      showToast(`SEO: ${_o}%`, 2000);
    } else {
      showToast('SEO check failed: ' + (data.error || 'unknown'), 3000);
    }
  } catch(e) {
    showToast('SEO check error: ' + e.message, 3000);
  }

  btn.disabled = false;
  btn.textContent = origText;
  btn.style.opacity = '1';
}

/** Run SEO check for ALL fields on the current page */
async function runSeoCheckAll(docId) {
  const inputs = document.querySelectorAll('#main [data-sp], #main [data-hp], #main [data-tpl]');
  const fields = [];
  inputs.forEach(input => {
    // Only check fields that have an SEO brief
    const field = input.closest('.field');
    if (!field || !field.querySelector('.seo-brief')) return;
    const fp = input.dataset.sp || input.dataset.hp || input.dataset.tpl;
    const content = input.value || input.textContent || '';
    if (fp && content.trim()) fields.push({ docId, fieldPath: fp, fieldContent: content });
  });
  // Also collect catgrid fields (each has its own docId)
  document.querySelectorAll('#main [data-field-doc][data-field-path]').forEach(input => {
    const field = input.closest('.field');
    if (!field || !field.querySelector('.seo-brief')) return;
    const catDocId = input.dataset.fieldDoc;
    const fp = input.dataset.fieldPath;
    const content = input.value || input.textContent || '';
    if (fp && content.trim()) fields.push({ docId: catDocId, fieldPath: fp, fieldContent: content });
  });

  if (fields.length === 0) {
    showToast('No fields with content to check', 2000);
    return;
  }

  const banner = document.getElementById('seoCheckAllBtn');
  if (banner) { banner.disabled = true; banner.textContent = `Checking 0/${fields.length}...`; }

  let checked = 0;
  for (const f of fields) {
    const fDocId = f.docId || docId;
    try {
      const res = await fetch(`/api/seo-check/${encodeURIComponent(fDocId)}/${encodeURIComponent(f.fieldPath)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fieldContent: f.fieldContent })
      });
      const data = await res.json();
      if (data.ok) {
        if (!_seoScoresCache[fDocId]) _seoScoresCache[fDocId] = {};
        _seoScoresCache[fDocId][f.fieldPath] = {
          ...data.scores,
          contentHash: data.contentHash,
          checkedContent: f.fieldContent
        };
      }
    } catch(e) { /* continue */ }
    checked++;
    if (banner) banner.textContent = `Checking ${checked}/${fields.length}...`;
  }

  if (banner) { banner.disabled = false; banner.textContent = 'Check All Fields'; }
  injectFieldControls(docId);
  // Refresh inline catgrid controls
  document.querySelectorAll('#main [data-field-doc][data-field-path]').forEach(el => {
    const ctrl = el.closest('.field')?.querySelector('.field-controls');
    if (ctrl) ctrl.innerHTML = fieldControls(el.dataset.fieldDoc, el.dataset.fieldPath, true);
  });
  updatePageScoreBanner(docId);
  showToast(`Done! ${checked} fields checked.`, 3000);
}

/** Show SEO detail popover for a field */
function showSeoDetail(docId, fieldPath) {
  const score = (_seoScoresCache[docId] || {})[fieldPath];
  if (!score) return;

  const modal = document.getElementById('seoDetailModal');
  const title = document.getElementById('seoDetailTitle');
  const content = document.getElementById('seoDetailContent');

  title.textContent = 'SEO Analysis: ' + fieldPath;

  const rec = score.recommendations || {};
  const critHtml = (rec.critical || []).map(r => `<li style="color:#f87171;margin-bottom:4px;">${esc(r)}</li>`).join('');
  const nonCritHtml = (rec.nonCritical || []).map(r => `<li style="color:#fbbf24;margin-bottom:4px;">${esc(r)}</li>`).join('');

  const fieldOverall = Math.round((score.generalScore + score.keywordScore + (100 - score.aiProbability)) / 3);

  content.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;padding:12px;background:rgba(0,0,0,.2);border-radius:8px;">
      <div style="font-size:40px;font-weight:800;color:${seoScoreColor(fieldOverall)};">${fieldOverall}%</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:4px;">OVERALL SCORE</div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:20px;text-align:center;">
      <div style="flex:1;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;">
        <div style="font-size:24px;font-weight:800;color:${seoScoreColor(score.generalScore)};">${score.generalScore}%</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:4px;">GENERAL</div>
      </div>
      <div style="flex:1;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;">
        <div style="font-size:24px;font-weight:800;color:${seoScoreColor(score.keywordScore)};">${score.keywordScore}%</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:4px;">KEYWORDS</div>
      </div>
      <div style="flex:1;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;">
        <div style="font-size:24px;font-weight:800;color:${seoAiColor(score.aiProbability)};">${score.aiProbability}%</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:4px;">AI PROB.</div>
      </div>
    </div>
    ${critHtml ? `<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;color:#f87171;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Critical Issues</div><ul style="padding-left:18px;margin:0;">${critHtml}</ul></div>` : ''}
    ${nonCritHtml ? `<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;color:#fbbf24;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Suggestions</div><ul style="padding-left:18px;margin:0;">${nonCritHtml}</ul></div>` : ''}
    ${!critHtml && !nonCritHtml ? '<p style="color:#64748b;">No recommendations.</p>' : ''}
    <div style="font-size:10px;color:#64748b;margin-top:12px;border-top:1px solid #334155;padding-top:8px;">
      Checked by ${esc(score.checkedBy || '?')} &middot; ${score.checkedAt ? new Date(score.checkedAt).toLocaleString() : '?'}
    </div>
  `;

  modal.style.display = 'flex';
}

function closeSeoDetailModal() {
  document.getElementById('seoDetailModal').style.display = 'none';
}

/** Render or update the page score banner */
function updatePageScoreBanner(docId) {
  const existing = document.getElementById('pageScoreBanner');
  if (existing) {
    existing.innerHTML = buildPageScoreBannerInner(docId);
  }
}

function buildPageScoreBannerInner(docId) {
  const scores = _seoScoresCache[docId] || {};
  const fields = Object.values(scores);

  // Count total evaluable fields on the page
  const totalInputs = document.querySelectorAll('#main [data-sp], #main [data-hp], #main [data-tpl]');
  const totalFields = totalInputs.length || 1;
  const checkedCount = fields.length;

  if (checkedCount === 0) {
    return `<span style="font-size:12px;color:#94a3b8;">No SEO scores yet. Click "SEO ✓" on fields or use "Check All Fields".</span>
      <button id="seoCheckAllBtn" onclick="runSeoCheckAll('${esc(docId)}')" style="margin-left:auto;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid #d97706;background:rgba(217,119,6,.08);color:#d97706;">Check All Fields</button>`;
  }

  // Average scores across checked fields (all as percentages)
  const sumGeneral = fields.reduce((s, f) => s + f.generalScore, 0);
  const sumKeyword = fields.reduce((s, f) => s + f.keywordScore, 0);
  const sumAi = fields.reduce((s, f) => s + f.aiProbability, 0);
  const avgGeneral = Math.round(sumGeneral / checkedCount);
  const avgKeyword = Math.round(sumKeyword / checkedCount);
  const avgAi = Math.round(sumAi / checkedCount);
  // Overall = average of general%, keyword%, and (100 - aiProb)%
  const overall = Math.round((avgGeneral + avgKeyword + (100 - avgAi)) / 3);

  return `
    <div style="display:flex;align-items:center;gap:4px;min-width:60px;">
      <div style="font-size:28px;font-weight:800;color:${seoScoreColor(overall)};">${overall}%</div>
    </div>
    <div style="display:flex;gap:14px;align-items:center;border-left:1px solid #334155;padding-left:14px;margin-left:4px;">
      <div style="text-align:center;min-width:45px;">
        <div style="font-size:16px;font-weight:700;color:${seoScoreColor(avgGeneral)};">${avgGeneral}%</div>
        <div style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;">General</div>
      </div>
      <div style="text-align:center;min-width:45px;">
        <div style="font-size:16px;font-weight:700;color:${seoScoreColor(avgKeyword)};">${avgKeyword}%</div>
        <div style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;">Keywords</div>
      </div>
      <div style="text-align:center;min-width:45px;">
        <div style="font-size:16px;font-weight:700;color:${seoAiColor(avgAi)};">${avgAi}%</div>
        <div style="font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;">AI Prob.</div>
      </div>
    </div>
    <div style="flex:1;font-size:11px;color:#64748b;margin-left:8px;">
      ${checkedCount} fields checked
    </div>
    <button id="seoCheckAllBtn" onclick="runSeoCheckAll('${esc(docId)}')" style="font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid #d97706;background:rgba(217,119,6,.08);color:#d97706;">Check All Fields</button>
  `;
}

let _reviewersCache = [];
let _expertReviewsCache = {};
let _expertReviewCountsCache = {};

async function loadExpertReviews(docId) {
  try {
    const res = await fetch('/api/expert-reviews/' + encodeURIComponent(docId));
    const data = await res.json();
    const byField = {};
    for (const r of (data.reviews || [])) {
      if (!byField[r.field_path]) byField[r.field_path] = [];
      byField[r.field_path].push(r);
    }
    _expertReviewsCache[docId] = byField;
    _expertReviewCountsCache[docId] = data.counts || {};
  } catch(e) {
    _expertReviewsCache[docId] = {};
    _expertReviewCountsCache[docId] = {};
  }
}

async function loadReviewers() {
  try {
    const res = await fetch('/api/reviewers');
    const data = await res.json();
    _reviewersCache = data.reviewers || [];
  } catch(e) {
    _reviewersCache = [];
  }
}

function renderHPExpertReviews() {
  if (!_reviewersCache.length) loadReviewers().then(() => {
    const el = document.getElementById('reviewersTableBody');
    if (el) el.innerHTML = renderReviewersRows();
  });

  const allReviews = [];
  const reviewsData = _expertReviewsCache['homepage'] || {};
  for (const [fieldPath, reviews] of Object.entries(reviewsData)) {
    for (const r of reviews) {
      let sectionLabel = 'Other';
      let sectionKey = null;
      for (const [secKey, info] of Object.entries(HP_SECTION_FIELD_MAP)) {
        if (fieldPath.startsWith(info.prefix)) {
          sectionLabel = info.label;
          sectionKey = secKey;
          break;
        }
      }
      allReviews.push({ ...r, sectionLabel, sectionKey });
    }
  }
  allReviews.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const totalCount = allReviews.length;
  const counts = _expertReviewCountsCache['homepage'] || {};

  let html = `
  <div style="display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap;">
    <div style="flex:0 0 auto;text-align:center;padding:24px 32px;background:#1e293b;border:1px solid #334155;border-radius:12px;">
      <div style="font-size:48px;font-weight:800;color:#10b981;">${totalCount}</div>
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;">Expert Reviews</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px;">${fieldsWithReviews} fields reviewed</div>

      <button onclick="toggleReviewersList()" style="padding:8px 20px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;">Manage Reviewers</button>
    </div>
  </div>`;

  html += `
  <div id="reviewersList" style="display:none;margin-bottom:24px;">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:#e2e8f0;">Registered Reviewers</h3>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead>
        <tr style="border-bottom:1px solid #334155;">
          <th style="text-align:left;padding:8px;color:#94a3b8;font-weight:600;">Name</th>
          <th style="text-align:left;padding:8px;color:#94a3b8;font-weight:600;">Email</th>
          <th style="text-align:left;padding:8px;color:#94a3b8;font-weight:600;">Status</th>
          <th style="text-align:right;padding:8px;color:#94a3b8;font-weight:600;">Actions</th>
        </tr>
      </thead>
      <tbody id="reviewersTableBody">${renderReviewersRows()}</tbody>
    </table>
  </div>`;

  if (allReviews.length === 0) {
    html += `<div style="text-align:center;padding:48px;color:#64748b;font-size:14px;">No expert reviews yet. Add a reviewer and share their unique review link.</div>`;
  } else {
    html += `<h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:#e2e8f0;">All Reviews</h3>`;

function toggleReviewersList() {

function copyReviewLink(token) {
  const url = `${window.location.origin}/review/${token}`;
  navigator.clipboard.writeText(url).then(() => showToast('Review link copied!')).catch(() => {
    prompt('Copy this link:', url);
  });
}

async function deactivateReviewer(id) {
  if (!confirm('Deactivate this reviewer? Their review link will stop working.')) return;
  try {
    const res = await fetch('/api/reviewers/' + id, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      showToast('Reviewer deactivated');
      await loadReviewers();
      const tbody = document.getElementById('reviewersTableBody');
      if (tbody) tbody.innerHTML = renderReviewersRows();
    }
  } catch(e) { showToast('Error deactivating reviewer', true); }
}

async function deleteExpertReview(id) {

  html += `</div>`;
  overlay.innerHTML = html;

function showReviewerError(msg) {
  let el = document.getElementById('rv-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'rv-error';
    el.style.cssText = 'background:#7f1d1d;color:#fca5a5;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:12px;';
    const btn = document.getElementById('rv-submit');
    btn.parentElement.insertBefore(el, btn.parentElement.firstChild);
  }
  el.textContent = msg;
  el.style.display = 'block';
}

async function submitReviewer() {
  const errEl = document.getElementById('rv-error');
  if (errEl) errEl.style.display = 'none';

  const name = document.getElementById('rv-name').value.trim();
  const email = document.getElementById('rv-email').value.trim();
  const linkedin = document.getElementById('rv-linkedin').value.trim();
  const bio = document.getElementById('rv-bio').value.trim();

  if (!name || !email) {
    showReviewerError('Name and email are required.');
    return;
  }

  if (bio) {
    const wordCount = bio.split(/\s+/).filter(Boolean).length;
    if (wordCount < 50 || wordCount > 100) {
      showReviewerError(`Bio must be 50\u2013100 words (currently ${wordCount}).`);
      return;
    }
  }

  const btn = document.getElementById('rv-submit');
  btn.disabled = true;
  btn.textContent = _editingReviewerId ? 'Updating...' : 'Creating...';

  try {
    const url = _editingReviewerId ? `/api/reviewers/${_editingReviewerId}` : '/api/reviewers';
    const method = _editingReviewerId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name: name, email, linkedin, bio })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('addReviewerOverlay').remove();
      showToast(_editingReviewerId ? 'Reviewer updated' : 'Reviewer created! Copy their review link to share.');
      if (!_editingReviewerId && data.token) {
        copyReviewLink(data.token);
      }
      await loadReviewers();
      const tbody = document.getElementById('reviewersTableBody');
      if (tbody) tbody.innerHTML = renderReviewersRows();
      const rl = document.getElementById('reviewersList');
      if (rl) rl.style.display = 'block';
    } else {
      showReviewerError(data.error || 'Error saving reviewer.');
    }
  } catch(e) {
    showReviewerError('Connection error. Please try again.');
  }

  btn.disabled = false;
  btn.textContent = _editingReviewerId ? 'Update' : 'Create';
}

let _commentsCache = {};      // { docId: { fieldPath: [{ id, username, comment, created_at }] } }
let _commentCountsCache = {}; // { docId: { fieldPath: count } }
let _allCommentsCache = [];   // global feed: [{ id, doc_id, field_path, username, comment, created_at }]
let _approvalLedgerCache = []; // immutable ledger: [{ id, doc_id, field_path, page_label, section_label, html_element, content, approved_by, approved_at }]

async function loadApprovalLedger() {
  try {
    const res = await fetch('/api/approval-ledger');
    const data = await res.json();
    _approvalLedgerCache = data.entries || [];
  } catch(e) {
    _approvalLedgerCache = [];
  }
}

async function loadComments(docId) {
  try {
    const res = await fetch('/api/comments/' + encodeURIComponent(docId));
    const data = await res.json();
    const byField = {};
    for (const c of (data.comments || [])) {
      if (!byField[c.field_path]) byField[c.field_path] = [];
      byField[c.field_path].push(c);
    }
    _commentsCache[docId] = byField;
    _commentCountsCache[docId] = data.counts || {};
  } catch(e) {
    _commentsCache[docId] = {};
    _commentCountsCache[docId] = {};
  }
}

async function loadAllComments() {
  try {
    const res = await fetch('/api/comments-all');
    const data = await res.json();
    _allCommentsCache = data.comments || [];
  } catch(e) {
    _allCommentsCache = [];
  }
}

let _commentsModalDocId = null;
let _commentsModalFieldPath = null;

async function showComments(docId, fieldPath) {
  _commentsModalDocId = docId;
  _commentsModalFieldPath = fieldPath;

  const modal = document.getElementById('commentsModal');
  const title = document.getElementById('commentsTitle');
  const content = document.getElementById('commentsContent');
  const input = document.getElementById('commentInput');

  title.textContent = 'Comments: ' + fieldPath;
  content.innerHTML = 'Loading...';
  input.value = '';
  modal.style.display = 'flex';

  try {
    const url = '/api/comments/' + encodeURIComponent(docId) + '/' + encodeURIComponent(fieldPath);
    const res = await fetch(url);
    const data = await res.json();
    const comments = data.comments || [];

    if (!comments.length) {
      content.innerHTML = '<p style="color:#64748b;">No comments yet. Be the first to add one!</p>';
      return;
    }

    content.innerHTML = comments.map(c => {
      const canDelete = currentUser && (currentUser.role === 'supervisor' || currentUser.username === c.username);
      const deleteBtn = canDelete
        ? `<button onclick="deleteComment(${c.id})" style="background:none;border:none;color:#f87171;font-size:11px;cursor:pointer;padding:0;">Delete</button>`
        : '';
      const isDone = c.done === 1;
      const doneStyle = isDone ? 'opacity:0.5;' : '';
      const strikeStyle = isDone ? 'text-decoration:line-through;' : '';
      return `
        <div style="padding:10px;border-bottom:1px solid #334155;${doneStyle}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="display:flex;align-items:center;gap:8px;">
              <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0;">
                <input type="checkbox" ${isDone?'checked':''} onchange="toggleCommentDoneModal(${c.id})" style="cursor:pointer;accent-color:#22c55e;">
                <span style="font-size:10px;color:${isDone?'#22c55e':'#64748b'};">${isDone?'Done':'Open'}</span>
              </label>
              <strong style="color:#818cf8;${strikeStyle}">${esc(c.username)}</strong>
            </span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span style="color:#64748b;font-size:11px;">${new Date(c.created_at).toLocaleString()}</span>
              ${deleteBtn}
            </span>
          </div>
          <div style="color:#e2e8f0;white-space:pre-wrap;${strikeStyle}">${esc(c.comment)}</div>
        </div>
      `;
    }).join('');
  } catch(e) {
    content.innerHTML = '<p style="color:#f87171;">Failed to load comments.</p>';
  }
}

function closeCommentsModal() {
  document.getElementById('commentsModal').style.display = 'none';
  _commentsModalDocId = null;
  _commentsModalFieldPath = null;
}

async function submitComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) { showToast('Please enter a comment', 2000); return; }
  if (!_commentsModalDocId || !_commentsModalFieldPath) return;

  const btn = document.getElementById('commentSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Posting...';

  try {
    const url = '/api/comments/' + encodeURIComponent(_commentsModalDocId) + '/' + encodeURIComponent(_commentsModalFieldPath);
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment: text })
    });
    const data = await res.json();
    if (data.ok) {
      // Update counts cache
      if (!_commentCountsCache[_commentsModalDocId]) _commentCountsCache[_commentsModalDocId] = {};
      const counts = _commentCountsCache[_commentsModalDocId];
      counts[_commentsModalFieldPath] = (counts[_commentsModalFieldPath] || 0) + 1;

      // Re-render modal and field controls
      await showComments(_commentsModalDocId, _commentsModalFieldPath);
      injectFieldControls(_commentsModalDocId);
      showToast('Comment added', 2000);
    }
  } catch(e) {
    showToast('Failed to add comment', 3000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add Comment';
  }
}

async function deleteComment(commentId) {
  if (!confirm('Delete this comment?')) return;
  try {
    const res = await fetch('/api/comments/' + commentId, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      // Update counts cache
      if (_commentsModalDocId && _commentCountsCache[_commentsModalDocId] && _commentsModalFieldPath) {
        const counts = _commentCountsCache[_commentsModalDocId];
        if (counts[_commentsModalFieldPath]) counts[_commentsModalFieldPath]--;
      }
      // Re-render modal and field controls
      await showComments(_commentsModalDocId, _commentsModalFieldPath);
      injectFieldControls(_commentsModalDocId);
      showToast('Comment deleted', 2000);
    } else {
      showToast(data.error || 'Failed to delete comment', 3000);
    }
  } catch(e) {
    showToast('Failed to delete comment', 3000);
  }
}

async function deleteCommentFromFeed(commentId, docId) {
  if (!confirm('Delete this comment?')) return;
  try {
    const res = await fetch('/api/comments/' + commentId, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      await loadComments(docId);
      const m = document.getElementById('main');
      renderHomepageSection(m);
      showToast('Comment hidden', 2000);
    } else {
      showToast(data.error || 'Failed to hide comment', 3000);
    }
  } catch(e) {
    showToast('Failed to hide comment', 3000);
  }
}

async function hideCommentFromFeed(commentId) {
  if (!confirm('Hide this comment? It will be removed from view but kept in the database.')) return;
  try {
    const res = await fetch('/api/comments/' + commentId, { method: 'DELETE' });
    const data = await res.json();
    if (data.ok) {
      await loadAllComments();
      const m = document.getElementById('main');
      renderHomepageSection(m);
      showToast('Comment hidden', 2000);
    } else {
      showToast(data.error || 'Failed to hide comment', 3000);
    }
  } catch(e) {
    showToast('Failed to hide comment', 3000);
  }
}

async function toggleCommentDone(commentId) {
  try {
    const res = await fetch('/api/comments/' + commentId + '/done', { method: 'PUT' });
    const data = await res.json();
    if (data.ok) {
      // Update cache in place to avoid full reload
      const c = _allCommentsCache.find(x => x.id === commentId);
      if (c) c.done = data.done;
      const m = document.getElementById('main');
      renderHomepageSection(m);
      setupCharCounters(); setupInputListeners(); injectFieldControls();
    }
  } catch(e) {
    showToast('Failed to update comment', 3000);
  }
}

async function toggleCommentDoneModal(commentId) {
  try {
    const res = await fetch('/api/comments/' + commentId + '/done', { method: 'PUT' });
    const data = await res.json();
    if (data.ok) {
      // Update global cache too
      const c = _allCommentsCache.find(x => x.id === commentId);
      if (c) c.done = data.done;
      // Refresh modal
      if (_commentsModalDocId && _commentsModalFieldPath) {
        await showComments(_commentsModalDocId, _commentsModalFieldPath);
      }
    }
  } catch(e) {
    showToast('Failed to update comment', 3000);
  }
}

let _suggestDocId = null;
let _suggestFieldPath = null;

async function showSuggestion(docId, fieldPath) {
  _suggestDocId = docId;
  _suggestFieldPath = fieldPath;

  // Get current field content
  const el = findFieldInput(docId, fieldPath);
  const fieldContent = el ? (el.value || el.textContent || '') : '';

  // Build modal with loading state
  let modal = document.getElementById('suggest-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'suggest-modal';
    document.body.appendChild(modal);
  }

  const sectionLabel = getSectionLabel(fieldPath) || fieldPath;

  modal.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)closeSuggestion()">
      <div style="background:#1e293b;border-radius:12px;padding:24px;max-width:640px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.5);border:1px solid #334155;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="margin:0;color:#e2e8f0;font-size:16px;">\u2728 AI Content Suggestion</h3>
          <button onclick="closeSuggestion()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:20px;">\u2715</button>
        </div>
        <div style="font-size:12px;color:#64748b;margin-bottom:16px;">${esc(sectionLabel)} \u2192 <code style="color:#8b5cf6;">${esc(fieldPath)}</code></div>
        <div id="suggest-body" style="text-align:center;padding:40px 0;">
          <div style="display:inline-block;width:32px;height:32px;border:3px solid #8b5cf6;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
          <p style="color:#94a3b8;margin-top:12px;font-size:13px;">Analyzing SEO brief, comments &amp; history\u2026</p>
        </div>
      </div>
    </div>`;
  modal.style.display = 'block';

  // Add spin animation if not present
  if (!document.getElementById('suggest-spin-style')) {
    const st = document.createElement('style');
    st.id = 'suggest-spin-style';
    st.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(st);
  }

  // Call API
  try {
    const res = await fetch(`/api/suggest/${encodeURIComponent(docId)}/${encodeURIComponent(fieldPath)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fieldContent })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Suggestion failed');

    renderSuggestionResult(data, fieldContent);
  } catch (err) {
    document.getElementById('suggest-body').innerHTML = `
      <div style="color:#f87171;text-align:center;padding:20px;">
        <p style="font-size:14px;font-weight:600;">\u26A0 Suggestion Failed</p>
        <p style="font-size:12px;color:#94a3b8;margin-top:8px;">${esc(err.message)}</p>
        <button onclick="closeSuggestion()" style="margin-top:16px;padding:6px 16px;background:#334155;color:#e2e8f0;border:none;border-radius:6px;cursor:pointer;">Close</button>
      </div>`;
  }
}

function renderSuggestionResult(data, currentContent) {
  const body = document.getElementById('suggest-body');
  if (!body) return;

  body.innerHTML = `
    <div style="margin-bottom:16px;">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('span').textContent=this.nextElementSibling.style.display==='none'?'\u25B6':'\u25BC'" style="cursor:pointer;display:flex;align-items:center;gap:6px;color:#94a3b8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">
        <span>\u25BC</span> Analysis
      </div>
      <div style="background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:12px;color:#cbd5e1;font-size:13px;line-height:1.6;">
        ${esc(data.analysis)}
      </div>
    </div>

function applySuggestion() {
  const textEl = document.getElementById('suggest-text');
  if (!textEl || !_suggestFieldPath) return;

  const suggestion = textEl.textContent;
  const el = findFieldInput(_suggestDocId, _suggestFieldPath);

  if (el) {
    el.value = suggestion;
    el.textContent = suggestion;
    // Trigger auto-save
    el.dispatchEvent(new Event('input', { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
    showToast('Suggestion applied \u2713', 2000);
  }
  closeSuggestion();
}

async function regenerateSuggestion() {
  if (!_suggestDocId || !_suggestFieldPath) return;
  // Show loading in the body
  const body = document.getElementById('suggest-body');
  if (body) {
    body.innerHTML = `
      <div style="text-align:center;padding:40px 0;">
        <div style="display:inline-block;width:32px;height:32px;border:3px solid #8b5cf6;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="color:#94a3b8;margin-top:12px;font-size:13px;">Regenerating\u2026</p>
      </div>`;
  }

  const el = findFieldInput(_suggestDocId, _suggestFieldPath);
  const fieldContent = el ? (el.value || el.textContent || '') : '';

  try {
    const res = await fetch(`/api/suggest/${encodeURIComponent(_suggestDocId)}/${encodeURIComponent(_suggestFieldPath)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fieldContent })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Suggestion failed');
    renderSuggestionResult(data, fieldContent);
  } catch (err) {
    if (body) body.innerHTML = `<p style="color:#f87171;text-align:center;">\u26A0 ${esc(err.message)}</p>`;
  }
}

async function addCommentAndRegenerate() {
  if (!_suggestDocId || !_suggestFieldPath) return;
  const input = document.getElementById('suggest-comment-input');
  const comment = input ? input.value.trim() : '';
  if (!comment) {
    showToast('Please write a comment first', 2000);
    input && input.focus();
    return;
  }

  // Post the comment to the DB
  try {
    const cRes = await fetch(`/api/comments/${encodeURIComponent(_suggestDocId)}/${encodeURIComponent(_suggestFieldPath)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment })
    });
    const cData = await cRes.json();
    if (!cData.ok) throw new Error(cData.error || 'Failed to add comment');

    // Update comment counts cache
    if (!_commentCountsCache[_suggestDocId]) _commentCountsCache[_suggestDocId] = {};
    _commentCountsCache[_suggestDocId][_suggestFieldPath] = (_commentCountsCache[_suggestDocId][_suggestFieldPath] || 0) + 1;

    showToast('Comment added — regenerating\u2026', 2000);
  } catch (err) {
    showToast('Failed to add comment: ' + err.message, 3000);
    return;
  }

  // Now regenerate with the new comment included
  await regenerateSuggestion();
}

function closeSuggestion() {
  const modal = document.getElementById('suggest-modal');
  if (modal) modal.style.display = 'none';
  _suggestDocId = null;
  _suggestFieldPath = null;
}


function getPageName(docId) {
  if (docId === 'homepage') return 'Homepage';
  if (docId.startsWith('subpage:')) {
    const slug = docId.replace('subpage:', '');
    return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }
  if (docId.startsWith('example:')) {
    const slug = docId.replace('example:', '');
    return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }
  return docId;
}

function getSectionLabel(fieldPath) {
  for (const [secKey, info] of Object.entries(HP_SECTION_FIELD_MAP)) {
    if (fieldPath.startsWith(info.prefix)) return info.label;
  }
  return 'Other';
}

function renderHPPhasePlanning() {
  if (!homepage._phases) homepage._phases = {};
  if (!homepage._currentPhase) homepage._currentPhase = 1;
  const phases = homepage._phases;
  const curPhase = homepage._currentPhase;

  // Get only the "Page Sections" group
  const pageSectionsGroup = HOMEPAGE_SECTION_GROUPS.find(g => g.group === 'Page Sections');
  if (!pageSectionsGroup) return '<p style="color:#94a3b8;">No page sections found.</p>';
  const allSections = pageSectionsGroup.items;

  // Build ordered section list from _sectionOrder (or default)
  if (!homepage._sectionOrder || !Array.isArray(homepage._sectionOrder)) {
    homepage._sectionOrder = allSections.map(s => s.key);
  }
  // Ensure all sections present (new ones get appended, removed ones get dropped)
  const allKeys = new Set(allSections.map(s => s.key));
  const ordered = homepage._sectionOrder.filter(k => allKeys.has(k));
  for (const s of allSections) {
    if (!ordered.includes(s.key)) ordered.push(s.key);
  }
  homepage._sectionOrder = ordered;

  const sectionMap = {};

  return html;

// ── Section reordering (up/down arrows) ──
function moveSectionOrder(sectionKey, direction) {
  if (!homepage._sectionOrder) return;
  const order = homepage._sectionOrder;
  const idx = order.indexOf(sectionKey);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= order.length) return;
  // Swap
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  debouncedSave(saveHomepage);
  const m = document.getElementById('main');
  renderHomepageSection(m);
  setupCharCounters(); setupInputListeners(); injectFieldControls();
}

// ── Drag & drop reordering ──
let _phaseDragKey = null;
let _phaseDropIndicator = null;

function _getDropIndicator() {
  if (!_phaseDropIndicator) {
    _phaseDropIndicator = document.createElement('div');
    _phaseDropIndicator.className = 'phase-drop-indicator';
    Object.assign(_phaseDropIndicator.style, {
      height: '3px', background: '#818cf8', borderRadius: '2px',
      margin: '-2px 0', position: 'relative', zIndex: '10',
      boxShadow: '0 0 8px rgba(129,140,248,.5)',
      transition: 'opacity .12s', pointerEvents: 'none'
    });
    // Add dots on each end
    const dot = 'position:absolute;width:9px;height:9px;border-radius:50%;background:#818cf8;top:-3px;';
    _phaseDropIndicator.innerHTML = `<span style="${dot}left:-4px;"></span><span style="${dot}right:-4px;"></span>`;
  }
  return _phaseDropIndicator;
}

function phaseDragStart(e) {
  _phaseDragKey = e.currentTarget.dataset.sectionKey;
  e.currentTarget.style.opacity = '0.3';
  e.currentTarget.style.transform = 'scale(0.98)';
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _phaseDragKey);
}

function phaseDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (!_phaseDragKey || row.dataset.sectionKey === _phaseDragKey) return;

  const list = document.getElementById('phase-section-list');
  const indicator = _getDropIndicator();
  const rect = row.getBoundingClientRect();
  const midY = rect.top + rect.height / 2;
  const insertBefore = e.clientY < midY;

  if (insertBefore) {
    list.insertBefore(indicator, row);
  } else {
    list.insertBefore(indicator, row.nextSibling);
  }
  indicator.dataset.targetKey = row.dataset.sectionKey;
  indicator.dataset.position = insertBefore ? 'before' : 'after';
}

function phaseDrop(e) {
  e.preventDefault();
  const indicator = _getDropIndicator();
  if (!_phaseDragKey || !indicator.parentNode) { _phaseCleanup(); return; }

  const targetKey = indicator.dataset.targetKey;
  const position = indicator.dataset.position;
  if (!targetKey || _phaseDragKey === targetKey) { _phaseCleanup(); return; }

  const order = homepage._sectionOrder;
  const fromIdx = order.indexOf(_phaseDragKey);
  let toIdx = order.indexOf(targetKey);
  if (fromIdx < 0 || toIdx < 0) { _phaseCleanup(); return; }

  // Remove from old position
  order.splice(fromIdx, 1);
  // Recalculate target index after removal
  toIdx = order.indexOf(targetKey);
  if (position === 'after') toIdx++;
  order.splice(toIdx, 0, _phaseDragKey);

  debouncedSave(saveHomepage);
  _phaseCleanup();
  const m = document.getElementById('main');
  renderHomepageSection(m);
  setupCharCounters(); setupInputListeners(); injectFieldControls();
}

function phaseDragEnd(e) {
  _phaseCleanup();
  e.currentTarget.style.opacity = '';
  e.currentTarget.style.transform = '';
}

function _phaseCleanup() {
  _phaseDragKey = null;
  const indicator = _phaseDropIndicator;
  if (indicator && indicator.parentNode) indicator.parentNode.removeChild(indicator);
  document.querySelectorAll('.phase-row').forEach(r => {
    r.style.opacity = ''; r.style.transform = '';
  });
}

// ─── Categories Grid drag & reorder ───

let _catGridDragIdx = null;

function catGridDragStart(e, idx) {
  _catGridDragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}

function catGridDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Visual indicator
  document.querySelectorAll('.catgrid-card').forEach(c => c.style.borderColor = '#1e293b');
  if (idx !== _catGridDragIdx) {
    e.currentTarget.style.borderColor = '#7c3aed';
  }
}

function catGridDrop(e, idx) {
  e.preventDefault();
  if (_catGridDragIdx === null || _catGridDragIdx === idx) return;
  const slugs = homepage.categoriesGrid.featuredSlugs;
  const [moved] = slugs.splice(_catGridDragIdx, 1);
  slugs.splice(idx, 0, moved);
  debouncedSave(saveHomepage);
  const m = document.getElementById('main');
  renderHomepageSection(m);
  setupCharCounters(); setupInputListeners(); injectFieldControls();
}

function catGridDragEnd(e) {
  _catGridDragIdx = null;
  document.querySelectorAll('.catgrid-card').forEach(c => {
    c.style.opacity = '1';
    c.style.borderColor = '#1e293b';
  });
}

function catGridMove(idx, dir) {
  const slugs = homepage.categoriesGrid.featuredSlugs;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= slugs.length) return;
  [slugs[idx], slugs[newIdx]] = [slugs[newIdx], slugs[idx]];
  debouncedSave(saveHomepage);
  const m = document.getElementById('main');
  renderHomepageSection(m);
  setupCharCounters(); setupInputListeners(); injectFieldControls();
}

let _kwCoverageCache = null;
let _kwCoverageFilter = 'all';
let _kwCoverageSortCol = 'volume';
let _kwCoverageSortAsc = false;

function renderHPKeywordCoverage() {
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h2 style="margin:0;font-size:20px;color:#e2e8f0;">Keyword Coverage Analysis</h2>
      <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Compares page text (current phase) against SEO goals keyword list</p>
    </div>
    <div style="display:flex;gap:8px;">
      ${_kwCoverageCache ? '<button onclick="printReport(\'keywordCoverage\')" style="padding:8px 16px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">🖨 Print PDF</button>' : ''}
      <button onclick="runKeywordCoverage()" style="padding:8px 20px;background:#204ecf;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">
        ${_kwCoverageCache ? '🔄 Re-run Analysis' : '▶ Run Coverage Analysis'}
      </button>
    </div>
  </div>`;

  if (!_kwCoverageCache) {
    html += `<div style="text-align:center;padding:60px 20px;color:#64748b;font-size:14px;">
      Click "Run Coverage Analysis" to analyze keyword presence on the homepage.
    </div>`;
    return html;
  }

  const d = _kwCoverageCache;

  // Summary cards
  const covColor = d.coveragePercent >= 70 ? '#4ade80' : d.coveragePercent >= 50 ? '#fbbf24' : '#ef4444';
  html += `<div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <div style="flex:0 0 auto;text-align:center;padding:24px 32px;background:#1e293b;border:1px solid #334155;border-radius:12px;">
      <div style="font-size:48px;font-weight:800;color:${covColor};">${d.coveragePercent}%</div>
      <div style="font-size:13px;font-weight:700;color:#e2e8f0;">Coverage</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px;">${d.found} of ${d.total} keywords</div>
    </div>
    <div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;">`;

  for (const [key, tier] of Object.entries(d.tiers)) {
    const pct = tier.total > 0 ? Math.round((tier.found / tier.total) * 100) : 0;
    const barColor = pct >= 70 ? '#4ade80' : pct >= 50 ? '#fbbf24' : '#ef4444';
    html += `<div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:12px;font-weight:600;color:#e2e8f0;">${tier.label}</span>
        <span style="font-size:12px;font-weight:700;color:${barColor};">${tier.found}/${tier.total} (${pct}%)</span>
      </div>
      <div style="height:6px;background:#0f172a;border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width .3s;"></div>
      </div>
    </div>`;
  }

  html += `</div></div>`;

  // Filter buttons
  const filters = [
    { key: 'all', label: `All (${d.total})` },
    { key: 'found', label: `Found (${d.found})` },
    { key: 'missing', label: `Missing (${d.missing})` },
    { key: 'highMissing', label: 'High Priority Missing' }
  ];
  html += `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">`;
  for (const f of filters) {
    const active = _kwCoverageFilter === f.key;
    html += `<button onclick="_kwCoverageFilter='${f.key}';document.getElementById('main').querySelector('.kw-cov-tbody').innerHTML=renderKwCoverageRows();"
      style="padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid ${active ? '#818cf8' : '#334155'};
      background:${active ? 'rgba(129,140,248,.15)' : '#0f172a'};color:${active ? '#818cf8' : '#94a3b8'};">${f.label}</button>`;
  }
  html += `</div>`;

  // Table
  const sortIndicator = (col) => _kwCoverageSortCol === col ? (_kwCoverageSortAsc ? ' ▲' : ' ▼') : '';
  html += `<div style="overflow-x:auto;border:1px solid #475569;border-radius:8px;background:#0f172a;">
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr style="background:#1e293b;border-bottom:2px solid #475569;">
        <th style="padding:10px 14px;text-align:left;color:#e2e8f0;font-weight:700;cursor:pointer;" onclick="sortKwCoverage('keyword')">Keyword${sortIndicator('keyword')}</th>
        <th style="padding:10px 14px;text-align:right;color:#e2e8f0;font-weight:700;cursor:pointer;width:100px;" onclick="sortKwCoverage('volume')">Volume${sortIndicator('volume')}</th>
        <th style="padding:10px 14px;text-align:center;color:#e2e8f0;font-weight:700;width:90px;">Status</th>
        <th style="padding:10px 14px;text-align:center;color:#e2e8f0;font-weight:700;width:80px;">Match</th>
        <th style="padding:10px 14px;text-align:center;color:#e2e8f0;font-weight:700;width:70px;">Tier</th>
      </tr></thead>
      <tbody class="kw-cov-tbody">${renderKwCoverageRows()}</tbody>
    </table>
  </div>`;

  return html;
}

function renderKwCoverageRows() {
  if (!_kwCoverageCache) return '';
  let kws = [..._kwCoverageCache.keywords];

  // Filter
  if (_kwCoverageFilter === 'found') kws = kws.filter(k => k.found);
  else if (_kwCoverageFilter === 'missing') kws = kws.filter(k => !k.found);
  else if (_kwCoverageFilter === 'highMissing') kws = kws.filter(k => !k.found && k.tier === 'high');

  // Sort
  kws.sort((a, b) => {
    let va = a[_kwCoverageSortCol], vb = b[_kwCoverageSortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va < vb) return _kwCoverageSortAsc ? -1 : 1;
    if (va > vb) return _kwCoverageSortAsc ? 1 : -1;
    return 0;
  });

  // Limit display to 200 rows
  const display = kws.slice(0, 200);
  let rows = '';
  for (let i = 0; i < display.length; i++) {
    const k = display[i];
    const statusIcon = k.found ? '✅' : '❌';
    const statusColor = k.found ? '#4ade80' : '#ff6b6b';
    const statusLabel = k.found ? 'Found' : 'Missing';
    const tierLabel = k.tier === 'high' ? 'HIGH' : k.tier === 'medium' ? 'MED' : 'LOW';
    const tierColor = k.tier === 'high' ? '#fbbf24' : k.tier === 'medium' ? '#a78bfa' : '#94a3b8';
    const rowBg = i % 2 === 0 ? '#0f172a' : '#1a2336';
    const missingBg = !k.found ? 'rgba(255,107,107,.06)' : rowBg;
    rows += `<tr style="border-top:1px solid #334155;background:${missingBg};">
      <td style="padding:8px 14px;color:#f1f5f9;font-weight:500;">${esc(k.keyword)}</td>
      <td style="padding:8px 14px;text-align:right;color:#cbd5e1;font-weight:600;font-variant-numeric:tabular-nums;">${(k.volume || 0).toLocaleString()}</td>
      <td style="padding:8px 14px;text-align:center;color:${statusColor};font-weight:600;">${statusIcon} ${statusLabel}</td>
      <td style="padding:8px 14px;text-align:center;color:#cbd5e1;">${k.matchType}</td>
      <td style="padding:8px 14px;text-align:center;"><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:${tierColor}20;color:${tierColor};border:1px solid ${tierColor}44;">${tierLabel}</span></td>
    </tr>`;
  }
  if (kws.length > 200) {
    rows += `<tr><td colspan="5" style="padding:12px;text-align:center;color:#94a3b8;font-size:12px;">Showing 200 of ${kws.length} results</td></tr>`;
  }
  return rows;
}

function sortKwCoverage(col) {
  if (_kwCoverageSortCol === col) _kwCoverageSortAsc = !_kwCoverageSortAsc;
  else { _kwCoverageSortCol = col; _kwCoverageSortAsc = col === 'keyword'; }
  document.getElementById('main').querySelector('.kw-cov-tbody').innerHTML = renderKwCoverageRows();
}

async function runKeywordCoverage() {
  const m = document.getElementById('main');
  m.innerHTML = `<div style="text-align:center;padding:80px 20px;color:#94a3b8;font-size:14px;">
    <div style="font-size:32px;margin-bottom:12px;">⏳</div>Analyzing keyword coverage...</div>`;
  try {
    const res = await fetch('/api/seo-audit/keyword-coverage', { credentials: 'include' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Unknown error');
    _kwCoverageCache = data;
    _kwCoverageFilter = 'all';
    renderHomepageSection(m);
    setupCharCounters(); setupInputListeners(); injectFieldControls();
  } catch (err) {
    m.innerHTML = `<div style="text-align:center;padding:80px 20px;color:#f87171;font-size:14px;">
      <div style="font-size:32px;margin-bottom:12px;">⚠️</div>Error: ${esc(err.message)}</div>`;
  }
}

async function goToField(docId, fieldPath) {
  let targetSection = null;
  for (const [secKey, info] of Object.entries(HP_SECTION_FIELD_MAP)) {
    if (fieldPath.startsWith(info.prefix)) { targetSection = secKey; break; }
  }
  if (!targetSection) return;
  activeHomepageSection = targetSection;
  renderSidebar();
  await renderMain();
  const el = document.querySelector(`[data-hp="${fieldPath}"]`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.outline = '2px solid #3b82f6';
    el.style.outlineOffset = '2px';
    setTimeout(() => { el.style.outline = ''; el.style.outlineOffset = ''; }, 2000);
  }
  showComments(docId, fieldPath);
}

function renderHPComments() {
  const allComments = _allCommentsCache;
  const totalCount = allComments.length;

  // Count by page
  const pageCounts = {};
  const sectionCounts = {};
  for (const c of allComments) {
    const pn = getPageName(c.doc_id);
    pageCounts[pn] = (pageCounts[pn] || 0) + 1;
    const sl = getSectionLabel(c.field_path);
    sectionCounts[sl] = (sectionCounts[sl] || 0) + 1;
  }

  const uniqueFields = new Set(allComments.map(c => c.doc_id + ':' + c.field_path)).size;

  // Header stats
  let html = `
  <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <div style="flex:0 0 auto;text-align:center;padding:24px 32px;background:#1e293b;border:1px solid #334155;border-radius:12px;">

      <div style="font-size:13px;font-weight:700;color:#e2e8f0;">Total Comments</div>

      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">By Page</div>
      <div style="display:flex;flex-direction:column;gap:6px;">`;

  for (const [page, count] of Object.entries(pageCounts).sort((a,b) => b[1] - a[1])) {
    html += `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;">
        <span style="color:#e2e8f0;font-size:12px;font-weight:600;">${esc(page)}</span>
        <span style="color:#818cf8;font-size:11px;font-weight:700;">${count}</span>
      </div>`;
  }

  html += `</div>
    </div>
    <div style="flex:1;min-width:200px;">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">By Section</div>
      <div style="display:flex;flex-direction:column;gap:6px;">`;

  for (const [sec, count] of Object.entries(sectionCounts).sort((a,b) => b[1] - a[1])) {
    html += `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;">
        <span style="color:#e2e8f0;font-size:12px;font-weight:600;">${esc(sec)}</span>
        <span style="color:#818cf8;font-size:11px;font-weight:700;">${count}</span>
      </div>`;
  }

  html += `</div>
    </div>
  </div>`;

  // Comments feed
  html += `
  <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;overflow:hidden;">
    <div style="padding:12px 16px;background:#0f172a;border-bottom:1px solid #334155;">
      <span style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">All Comments</span>
    </div>`;

  if (totalCount === 0) {
    html += '<div style="padding:24px;text-align:center;color:#64748b;">No comments yet. Use the 💬 button on any field to add one.</div>';
  } else {
    for (const c of allComments) {
      const canDelete = currentUser && (currentUser.role === 'supervisor' || currentUser.username === c.username);
      const hideBtn = canDelete
        ? `<button onclick="hideCommentFromFeed(${c.id})" style="background:none;border:1px solid #334155;color:#f87171;font-size:10px;cursor:pointer;padding:2px 8px;border-radius:4px;">Hide</button>`
        : '';
      const pageName = getPageName(c.doc_id);
      const sectionLabel = getSectionLabel(c.field_path);
      const dateStr = new Date(c.created_at).toLocaleString();
      const isDone = c.done === 1;
      const doneStyle = isDone ? 'opacity:0.5;' : '';
      const strikeStyle = isDone ? 'text-decoration:line-through;' : '';
      html += `
      <div id="comment-${c.id}" style="padding:14px 16px;border-bottom:1px solid #334155;${doneStyle}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">

          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <span style="color:#64748b;font-size:10px;white-space:nowrap;">${dateStr}</span>
            ${hideBtn}
          </div>
        </div>
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;font-family:monospace;${strikeStyle}">${esc(c.field_path)} <a href="#" onclick="event.preventDefault();goToField('${escAttr(c.doc_id)}','${escAttr(c.field_path)}')" style="font-size:11px;color:#818cf8;text-decoration:none;margin-left:6px;">\u2192 Go to field</a></div>
        <div style="color:#e2e8f0;font-size:13px;white-space:pre-wrap;${strikeStyle}">${esc(c.comment)}</div>
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

async function loadSurveys() {
  try {
    const res = await fetch('/api/surveys');
    if (!res.ok) throw new Error('Failed to load surveys');
    const { surveys } = await res.json();
    _surveysCache = surveys || [];
  } catch(e) {
    console.error('loadSurveys error:', e);
    _surveysCache = [];
  }
}

async function loadSurveyResponses(surveyId) {
  if (!surveyId) return;
  try {
    const res = await fetch('/api/survey-responses/' + encodeURIComponent(surveyId));
    if (!res.ok) throw new Error('Failed to load responses');
    const { responses } = await res.json();
    _surveyResponsesCache[surveyId] = responses || [];
  } catch(e) {
    console.error('loadSurveyResponses error:', e);
    _surveyResponsesCache[surveyId] = [];
  }
}

async function toggleSurveyActive(surveyId, active) {
  try {
    const res = await fetch('/api/surveys/' + encodeURIComponent(surveyId), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active })
    });
    if (!res.ok) throw new Error('Failed');
    showToast(active ? 'Survey activated' : 'Survey deactivated');
    await loadSurveys();
    renderMain();
  } catch(e) {
    showToast('Failed to update survey', 3000);
  }
}

async function switchSurveyResponses(surveyId) {
  _selectedSurveyId = surveyId;
  await loadSurveyResponses(surveyId);
  renderMain();
}

function renderSurveyResponses() {
  if (_surveysCache.length === 0) {
    return `<div style="padding:24px;color:#94a3b8;text-align:center;">
      <p>No surveys found.</p>
    </div>`;
  }

  if (!_selectedSurveyId) _selectedSurveyId = _surveysCache[0].id;
  const survey = _surveysCache.find(s => s.id === _selectedSurveyId) || _surveysCache[0];
  const questions = JSON.parse(survey.questions || '[]');
  const responses = _surveyResponsesCache[survey.id] || [];

  let html = '';

  // Survey selector
  if (_surveysCache.length > 1) {
    html += `<div style="margin-bottom:20px;">
      <label style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;">Select Survey</label>
